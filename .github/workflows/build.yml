name: Build & push enclave image

# ── Authentication (keyless WIF) ─────────────────────────────────────────────
#
# This workflow authenticates to GCP using Workload Identity Federation — no
# stored keys. The operator's WIF provider trusts this repository and lets it
# impersonate a PUSH-ONLY service account that can only write to the Artifact
# Registry repo (no deploy, IAM, secrets, or KMS access). The provider name and
# that SA email are supplied as the GCP_WIF_PROVIDER and GCP_SERVICE_ACCOUNT
# repo variables. See README "CI/CD" for the operator setup.
#
# ── What this workflow does ──────────────────────────────────────────────────
#
# Builds the enclave Docker image on main and public release-tag pushes, then pushes it to the deployment's Artifact
# Registry (us-central1-docker.pkg.dev/kioku-joerodriguez/kioku/kioku-enclave).
# All security-sensitive config is baked in via --build-arg so it is part of
# the attested image digest and cannot be overridden at VM launch time.
#
# The image digest output is what matters: the operator pins it in their
# deployment terraform (var.enclave_image_digest) to activate the
# attestation-gated KMS binding. Rolling the enclave VM is a separate,
# manually-triggered step in the deployment repo (for the canonical Kioku
# deployment: the `enclave.yml` workflow in the kioku repo).
#
# ── Repository variables required ───────────────────────────────────────────
# (set in repo Settings → Variables/Secrets)
#
# Variables (non-secret, visible in logs):
#   GCP_WIF_PROVIDER          WIF provider resource name (from the operator infra)
#   GCP_SERVICE_ACCOUNT       Push-only SA email this repo impersonates
#                             (artifactregistry.writer only — NOT a deployer)
#
#   Build-arg variables (baked into the attested image digest):
#   ENCLAVE_KMS_PROJECT       GCP project containing the KMS key ring
#   ENCLAVE_KMS_LOCATION      KMS key location (e.g. global)
#   ENCLAVE_KMS_KEY_RING      KMS key ring name
#   ENCLAVE_KMS_KEY           KMS crypto key name
#   ENCLAVE_GCS_BUCKET        GCS bucket for encrypted index blobs
#   ENCLAVE_RUN_SA_EMAIL      Control-plane service account email
#   ENCLAVE_AUDIENCE          Enclave's own URL (for ID-token aud validation)
#   ENCLAVE_ATTEST_STS_AUDIENCE  WIF provider resource name for attestation STS
#   GOOGLE_DESKTOP_CLIENT_ID  Google OAuth desktop audience
#   GOOGLE_WEB_CLIENT_ID      Google OAuth web audience
#   ALLOWED_EMAILS            Comma-separated production account allow-list
#   BASE_URL                  Public origin, e.g. https://api.kiokuu.com
#   VERTEX_PROJECT            GCP project for episode summarization
#   VERTEX_LOCATION           Vertex region (e.g. us-central1)
#   VERTEX_MODEL              Vertex model name
#   ENCLAVE_ACME              Must be 1 for production in-enclave TLS
#   ENCLAVE_ACME_DIRECTORY    ACME directory URL
#   ENCLAVE_ACME_CONTACT      ACME account contact email

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: enclave-build
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  PROJECT_ID: kioku-joerodriguez
  REGION: us-central1
  IMAGE_NAME: kioku-enclave

jobs:
  # ── Build and push the enclave image to Artifact Registry ─────────────────
  # No approval gate here: pushing an image to AR is non-destructive.
  # The content-addressable digest is published in the job summary so the
  # operator can pin it in their deployment terraform to roll the VM.
  build-push:
    name: Build + push enclave image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.build.outputs.image_tag }}
      image_uri: ${{ steps.build.outputs.image_uri }}
      digest:    ${{ steps.digest.outputs.digest }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP (keyless WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      # Configure Docker credential helper for Artifact Registry.
      # We build on the runner and push directly — we do NOT use
      # `gcloud builds submit` because its pre-flight bucket check fails
      # under WIF federated credentials even with storage.admin on the bucket.
      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Validate baked production configuration
        env:
          ENCLAVE_KMS_PROJECT: ${{ vars.ENCLAVE_KMS_PROJECT }}
          ENCLAVE_KMS_LOCATION: ${{ vars.ENCLAVE_KMS_LOCATION }}
          ENCLAVE_KMS_KEY_RING: ${{ vars.ENCLAVE_KMS_KEY_RING }}
          ENCLAVE_KMS_KEY: ${{ vars.ENCLAVE_KMS_KEY }}
          ENCLAVE_GCS_BUCKET: ${{ vars.ENCLAVE_GCS_BUCKET }}
          ENCLAVE_RUN_SA_EMAIL: ${{ vars.ENCLAVE_RUN_SA_EMAIL }}
          ENCLAVE_AUDIENCE: ${{ vars.ENCLAVE_AUDIENCE }}
          ENCLAVE_ATTEST_STS_AUDIENCE: ${{ vars.ENCLAVE_ATTEST_STS_AUDIENCE }}
          GOOGLE_DESKTOP_CLIENT_ID: ${{ vars.GOOGLE_DESKTOP_CLIENT_ID }}
          GOOGLE_WEB_CLIENT_ID: ${{ vars.GOOGLE_WEB_CLIENT_ID }}
          ALLOWED_EMAILS: ${{ vars.ALLOWED_EMAILS }}
          BASE_URL: ${{ vars.BASE_URL }}
          VERTEX_PROJECT: ${{ vars.VERTEX_PROJECT }}
          VERTEX_LOCATION: ${{ vars.VERTEX_LOCATION }}
          VERTEX_MODEL: ${{ vars.VERTEX_MODEL }}
          ENCLAVE_ACME: ${{ vars.ENCLAVE_ACME }}
          ENCLAVE_ACME_DIRECTORY: ${{ vars.ENCLAVE_ACME_DIRECTORY }}
          ENCLAVE_ACME_CONTACT: ${{ vars.ENCLAVE_ACME_CONTACT }}
        run: |
          REQUIRED=(
            ENCLAVE_KMS_PROJECT ENCLAVE_KMS_LOCATION ENCLAVE_KMS_KEY_RING
            ENCLAVE_KMS_KEY ENCLAVE_GCS_BUCKET ENCLAVE_RUN_SA_EMAIL
            ENCLAVE_AUDIENCE ENCLAVE_ATTEST_STS_AUDIENCE
            GOOGLE_DESKTOP_CLIENT_ID GOOGLE_WEB_CLIENT_ID ALLOWED_EMAILS BASE_URL
            VERTEX_PROJECT VERTEX_LOCATION VERTEX_MODEL
            ENCLAVE_ACME ENCLAVE_ACME_DIRECTORY ENCLAVE_ACME_CONTACT
          )
          for name in "${REQUIRED[@]}"; do
            if [[ -z "${!name}" ]]; then
              echo "Missing required repository variable: $name" >&2
              exit 1
            fi
          done
          if [[ "$ENCLAVE_ACME" != "1" ]]; then
            echo "ENCLAVE_ACME must be 1 for the production image." >&2
            exit 1
          fi

      - name: Build and push image
        id: build
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TIMESTAMP="$(date +%s)"
          IMAGE_TAG="${SHORT_SHA}-${TIMESTAMP}"
          IMAGE_URI="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/kioku/${{ env.IMAGE_NAME }}:${IMAGE_TAG}"

          echo "Building image: ${IMAGE_URI}"

          # All security-sensitive config is baked in at build time so it is
          # part of the attested image digest and cannot be overridden at VM
          # launch time via tee-env-* metadata.
          docker build --platform linux/amd64 \
            --build-arg KMS_PROJECT="${{ vars.ENCLAVE_KMS_PROJECT }}" \
            --build-arg KMS_LOCATION="${{ vars.ENCLAVE_KMS_LOCATION }}" \
            --build-arg KMS_KEY_RING="${{ vars.ENCLAVE_KMS_KEY_RING }}" \
            --build-arg KMS_KEY="${{ vars.ENCLAVE_KMS_KEY }}" \
            --build-arg GCS_BUCKET="${{ vars.ENCLAVE_GCS_BUCKET }}" \
            --build-arg RUN_SA_EMAIL="${{ vars.ENCLAVE_RUN_SA_EMAIL }}" \
            --build-arg ENCLAVE_AUDIENCE="${{ vars.ENCLAVE_AUDIENCE }}" \
            --build-arg ATTEST_STS_AUDIENCE="${{ vars.ENCLAVE_ATTEST_STS_AUDIENCE }}" \
            --build-arg GOOGLE_DESKTOP_CLIENT_ID="${{ vars.GOOGLE_DESKTOP_CLIENT_ID }}" \
            --build-arg GOOGLE_WEB_CLIENT_ID="${{ vars.GOOGLE_WEB_CLIENT_ID }}" \
            --build-arg ALLOWED_EMAILS="${{ vars.ALLOWED_EMAILS }}" \
            --build-arg BASE_URL="${{ vars.BASE_URL }}" \
            --build-arg VERTEX_PROJECT="${{ vars.VERTEX_PROJECT }}" \
            --build-arg VERTEX_LOCATION="${{ vars.VERTEX_LOCATION }}" \
            --build-arg VERTEX_MODEL="${{ vars.VERTEX_MODEL }}" \
            --build-arg ENCLAVE_ACME="${{ vars.ENCLAVE_ACME }}" \
            --build-arg ENCLAVE_ACME_DIRECTORY="${{ vars.ENCLAVE_ACME_DIRECTORY }}" \
            --build-arg ENCLAVE_ACME_CONTACT="${{ vars.ENCLAVE_ACME_CONTACT }}" \
            -t "${IMAGE_URI}" .

          docker push "${IMAGE_URI}"

          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_uri=${IMAGE_URI}" >> "$GITHUB_OUTPUT"

      # Retrieve the content-addressable sha256 digest for the pushed image.
      # This digest is what the operator pins in their deployment terraform
      # (var.enclave_image_digest) to activate the attestation-gated KMS
      # binding. The VM roll is triggered separately in the deployment repo.
      - name: Retrieve image digest
        id: digest
        run: |
          IMAGE_URI="${{ steps.build.outputs.image_uri }}"
          DIGEST="$(gcloud artifacts docker images describe "${IMAGE_URI}" \
            --format='value(image_summary.digest)' 2>/dev/null || echo 'unknown')"
          if [ "$DIGEST" = "unknown" ]; then
            echo "::error::Failed to retrieve digest for ${IMAGE_URI}"
            exit 1
          fi
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          {
            echo "## Enclave image built"
            echo ""
            echo "| Field | Value |"
            echo "|---|---|"
            echo "| Image tag | \`${{ steps.build.outputs.image_tag }}\` |"
            echo "| Image URI | \`${IMAGE_URI}\` |"
            echo "| **Image digest** | \`${DIGEST}\` |"
            echo "| Commit | \`${GITHUB_SHA}\` |"
            echo "| Built at | $(date -u '+%Y-%m-%dT%H:%M:%SZ') |"
            echo ""
            echo "### Next step: roll the VM"
            echo ""
            echo "Pin this digest as \`enclave_image_digest\` in the deployment terraform"
            echo "and trigger the deployment repo's VM-roll workflow to replace the VM."
          } >> "$GITHUB_STEP_SUMMARY"

      # Keep release metadata machine-readable as well as visible in the job
      # summary. scripts/release.sh publishes this file on the public GitHub
      # Release, giving auditors a stable source commit -> image digest record.
      - name: Write release metadata
        run: |
          IMAGE_URI="${{ steps.build.outputs.image_uri }}"
          DIGEST="${{ steps.digest.outputs.digest }}"
          IMAGE_REPOSITORY="${IMAGE_URI%:*}"
          python3 - \
            "${GITHUB_REF_NAME}" \
            "${GITHUB_SHA}" \
            "${IMAGE_URI}" \
            "${IMAGE_REPOSITORY}@${DIGEST}" \
            "${DIGEST}" \
            "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            > enclave-release.json <<'PY'
          import json
          import sys

          tag, commit, image_uri, digest_uri, digest, build_url = sys.argv[1:]
          print(json.dumps({
              "schema_version": 1,
              "source_repository": "https://github.com/${{ github.repository }}",
              "source_ref": tag,
              "source_commit": commit,
              "image_uri": image_uri,
              "image_digest_uri": digest_uri,
              "image_digest": digest,
              "build_url": build_url,
          }, indent=2))
          PY

      - name: Upload release metadata
        uses: actions/upload-artifact@v4
        with:
          name: enclave-release-metadata-${{ github.run_id }}
          path: enclave-release.json
          retention-days: 90
